<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Simulator - 50x Scale Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; user-select: none; }
        
        #home-screen {
            position: absolute; inset: 0; background: linear-gradient(135deg, #051015 0%, #000000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200;
        }
        #home-screen h1 { color: #00ff9d; font-size: 48px; text-shadow: 0 0 15px rgba(0,255,157,0.5); letter-spacing: 5px; text-align: center; }
        .fleet-container { display: flex; gap: 20px; margin-top: 30px; flex-wrap: wrap; justify-content: center; max-width: 1000px; }
        .plane-card {
            background: rgba(0, 255, 157, 0.05); border: 2px solid #00ff9d; color: white;
            padding: 30px 40px; font-size: 24px; font-weight: bold; cursor: pointer;
            border-radius: 8px; transition: all 0.3s ease; text-align: center; min-width: 200px;
        }
        .plane-card:hover { background: rgba(0, 255, 157, 0.2); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,255,157,0.3); }
        .plane-desc { font-size: 14px; color: #aaa; margin-top: 10px; font-weight: normal; }

        #ui {
            display: none; position: absolute; top: 20px; left: 20px; color: #00ff9d;
            background: rgba(0, 15, 5, 0.7); padding: 20px; border: 1px solid #00ff9d;
            border-radius: 4px; pointer-events: none; text-shadow: 0 0 5px #00ff9d; z-index: 10;
        }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        #status { color: #ffaa00; font-weight: bold; animation: blink 1s infinite; display: none; margin-top: 10px; font-size: 18px; }

        #loading {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: 24px; background: rgba(0,0,0,0.8);
            padding: 20px 40px; border-radius: 10px; font-weight: bold; z-index: 100; border: 1px solid #00ff9d; text-align: center;
        }
        #crash-screen {
            display: none; position: absolute; inset: 0; background: rgba(255, 0, 0, 0.6); color: white; 
            justify-content: center; align-items: center; flex-direction: column; 
            font-size: 64px; font-weight: bold; z-index: 150; text-shadow: 2px 2px 10px black; text-align: center;
        }
        .btn { margin-top: 20px; padding: 15px 30px; font-size: 24px; cursor: pointer; background: white; color: red; border: none; font-weight: bold; border-radius: 5px; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="home-screen">
        <h1>TITAN FLIGHT SIMULATOR</h1>
        <div style="color:#aaa; margin-bottom: 20px;">WORLD GENERATION: 50X MASSIVE SCALE</div>
        <div class="fleet-container">
            <div class="plane-card" id="btn-737">BOEING 737 MAX<div class="plane-desc">Narrow-body</div></div>
            <div class="plane-card" id="btn-747">BOEING 747-400<div class="plane-desc">Air France</div></div>
            <div class="plane-card" id="btn-a380">AIRBUS A380<div class="plane-desc">Superjumbo</div></div>
        </div>
    </div>

    <div id="loading">GENERATING MASSIVE WORLD...<br><span id="load-progress">0%</span></div>
    
    <div id="crash-screen">
        <div>AIRCRAFT DESTROYED</div>
        <div style="font-size: 24px; margin-top: 10px;" id="crash-reason"></div>
        <button class="btn" onclick="location.reload()">RESTART SIMULATION</button>
    </div>

    <div id="ui">
        <h2 style="margin-top:0;" id="plane-name-ui">SKYBORNE OS</h2>
        <div>TIME: <span id="time-display">12:00</span></div>
        <div id="status">⚠ SPAWN PROTECTION ACTIVE ⚠</div>
        <hr style="border-color: #00ff9d;">
        <div>AIRSPEED: <span id="speed">0</span> KTS</div>
        <div>ALTITUDE: <span id="alt">0</span> FT</div>
        <div>THROTTLE: <span id="throttle">0</span>%</div>
        <div>GEAR: <span id="gear">DOWN</span></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- 50X SCALE MULTIPLIER ---
        const MULT = 50;

        // --- CALIBRATED TO BE MASSIVE BUT KEEP THE CAMERA CLOSE ---
        const FLEET = {
            '737': {
                name: "BOEING 737 MAX", filename: "plane.fbx", type: "fbx",
                scale: 0.05 * MULT, clearance: 30 * MULT, 
                maxSpeed: 520 * MULT, stallSpeed: 140 * MULT,
                camDist: -1200, camHeight: 400, camLookUp: 150   
            },
            '747': {
                name: "AIR FRANCE 747-400", filename: "air_france_boeing_747-400.glb", type: "glb",
                scale: 1.0 * MULT, clearance: 18 * MULT, 
                maxSpeed: 540 * MULT, stallSpeed: 150 * MULT,
                camDist: -2000, camHeight: 600, camLookUp: 250   
            },
            'a380': {
                name: "AIRBUS A380", filename: "airbus-a380.glb", type: "glb",
                scale: 1.0 * MULT, clearance: 15 * MULT, 
                maxSpeed: 560 * MULT, stallSpeed: 160 * MULT,
                camDist: -2500, camHeight: 700, camLookUp: 300   
            }
        };

        let currentPlaneData = null;

        // --- CORE SETUP ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x5ca0e8, 0.000008); 
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 10, 800000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        let timeOfDay = Math.PI / 2;
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
        scene.add(hemiLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
        sunLight.castShadow = true;
        sunLight.shadow.camera.left = -50000; sunLight.shadow.camera.right = 50000;
        sunLight.shadow.camera.top = 50000; sunLight.shadow.camera.bottom = -50000;
        sunLight.shadow.camera.far = 200000;
        scene.add(sunLight);

        // --- TOPOGRAPHICAL ENVIRONMENT ---
        const GROUND_LEVEL = -500;

        function getTerrainHeight(x, z) {
            const distToRunway = Math.abs(x);
            if (distToRunway < 6000) return GROUND_LEVEL; 
            
            let height = Math.sin(x * 0.00005) * Math.cos(z * 0.00005) * 8000;
            height += Math.sin(x * 0.0002) * Math.cos(z * 0.0002) * 2500; 
            
            let blend = Math.min((distToRunway - 6000) / 8000, 1.0);
            return GROUND_LEVEL + (height * blend);
        }

        const groundGeo = new THREE.PlaneGeometry(600000, 600000, 150, 150);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x1f3d14, roughness: 1.0 });
        
        const pos = groundGeo.attributes.position;
        for (let i = 0; i < pos.count; i++) {
            let vx = pos.getX(i);
            let vy = pos.getY(i); 
            let terrainZ = getTerrainHeight(vx, vy) - GROUND_LEVEL;
            pos.setZ(i, terrainZ);
        }
        groundGeo.computeVertexNormals();

        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2; 
        ground.position.y = GROUND_LEVEL; 
        ground.receiveShadow = true; 
        scene.add(ground);

        const treeCount = 4000;
        const trunkGeo = new THREE.CylinderGeometry(80, 120, 800, 5);
        const trunkMat = new THREE.MeshStandardMaterial({color: 0x3d2817});
        const leavesGeo = new THREE.ConeGeometry(600, 1600, 5);
        const leavesMat = new THREE.MeshStandardMaterial({color: 0x143d14});

        const trunks = new THREE.InstancedMesh(trunkGeo, trunkMat, treeCount);
        const leaves = new THREE.InstancedMesh(leavesGeo, leavesMat, treeCount);
        
        const dummy = new THREE.Object3D();
        let treeIdx = 0;
        while (treeIdx < treeCount) {
            let tx = (Math.random() - 0.5) * 400000;
            let tz = (Math.random() - 0.5) * 400000;
            
            if (Math.abs(tx) > 8000 && tz > -80000) { 
                let ty = getTerrainHeight(tx, tz);
                
                dummy.position.set(tx, ty + 400, tz);
                dummy.updateMatrix();
                trunks.setMatrixAt(treeIdx, dummy.matrix);

                dummy.position.set(tx, ty + 1600, tz);
                dummy.updateMatrix();
                leaves.setMatrixAt(treeIdx, dummy.matrix);
                treeIdx++;
            }
        }
        scene.add(trunks); scene.add(leaves);

        function createRunwayTexture() {
            const canvas = document.createElement('canvas'); canvas.width = 1024; canvas.height = 4096;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#1a1a1a'; ctx.fillRect(0, 0, 1024, 4096);
            ctx.fillStyle = '#ffffff'; ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 15; ctx.setLineDash([100, 100]);
            ctx.beginPath(); ctx.moveTo(512, 0); ctx.lineTo(512, 4096); ctx.stroke();
            ctx.setLineDash([]); ctx.lineWidth = 20;
            ctx.beginPath(); ctx.moveTo(50, 0); ctx.lineTo(50, 4096); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(974, 0); ctx.lineTo(974, 4096); ctx.stroke();
            ctx.font = 'bold 200px Arial'; ctx.textAlign = 'center'; ctx.fillText("09", 512, 400);
            for(let i=0; i<4; i++) ctx.fillRect(200 + (i*50), 500, 20, 300);
            for(let i=0; i<4; i++) ctx.fillRect(650 + (i*50), 500, 20, 300);
            ctx.save(); ctx.translate(512, 3696); ctx.rotate(Math.PI); ctx.fillText("27", 0, 0);
            for(let i=0; i<4; i++) ctx.fillRect(-312 + (i*50), 100, 20, 300);
            for(let i=0; i<4; i++) ctx.fillRect(138 + (i*50), 100, 20, 300); ctx.restore();
            const tex = new THREE.CanvasTexture(canvas); tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping; return tex;
        }

        // --- MASSIVE WIDE RUNWAY FOR 50X PLANES ---
        const runway = new THREE.Mesh(new THREE.PlaneGeometry(8000, 200000), new THREE.MeshStandardMaterial({ map: createRunwayTexture(), roughness: 0.8 }));
        runway.rotation.x = -Math.PI / 2; 
        runway.position.y = GROUND_LEVEL + 5; 
        runway.receiveShadow = true; 
        scene.add(runway);

        const cityGroup = new THREE.Group();
        const buildingGeo = new THREE.BoxGeometry(1, 1, 1);
        
        const terminal = new THREE.Mesh(buildingGeo, new THREE.MeshStandardMaterial({ color: 0xaaaaaa }));
        terminal.scale.set(15000, 2000, 6000);
        terminal.position.set(-15000, GROUND_LEVEL + 1000, 0);
        cityGroup.add(terminal);

        const tower = new THREE.Mesh(buildingGeo, new THREE.MeshStandardMaterial({ color: 0x888888 }));
        tower.scale.set(1000, 5000, 1000);
        tower.position.set(-8000, GROUND_LEVEL + 2500, 0);
        cityGroup.add(tower);

        for(let i = 0; i < 150; i++) {
            let mat = new THREE.MeshStandardMaterial({
                color: Math.random() > 0.5 ? 0x445566 : 0x112233, 
                metalness: 0.8, roughness: 0.2
            });
            let mesh = new THREE.Mesh(buildingGeo, mat);
            let w = 1000 + Math.random() * 3000;
            let h = 3000 + Math.random() * 15000;
            let d = 1000 + Math.random() * 3000;
            mesh.scale.set(w, h, d);
            mesh.position.set(-30000 - Math.random() * 50000, GROUND_LEVEL + h/2, (Math.random() - 0.5) * 60000);
            cityGroup.add(mesh);
        }
        scene.add(cityGroup);

        // --- FLIGHT VARIABLES ---
        let airplane = null;
        let speed = 0, throttle = 0;
        let gearDown = true, crashed = false, spawnProtection = false; 
        
        let PHYSICS = { acceleration: 25 * MULT, liftFactor: 0.05, gravity: 9.81 * MULT }; 
        const keys = { w: false, a: false, s: false, d: false, q: false, e: false, shift: false, control: false };

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase(); if (keys.hasOwnProperty(key)) keys[key] = true;
            if (key === 'g' && !crashed && airplane && airplane.position.y > (getTerrainHeight(airplane.position.x, airplane.position.z) + PHYSICS.clearance + 500)) gearDown = !gearDown;
        });
        window.addEventListener('keyup', (e) => { const key = e.key.toLowerCase(); if (keys.hasOwnProperty(key)) keys[key] = false; });

        // --- START MENU LOGIC ---
        document.getElementById('btn-737').addEventListener('click', () => spawnAircraft('737'));
        document.getElementById('btn-747').addEventListener('click', () => spawnAircraft('747')); 
        document.getElementById('btn-a380').addEventListener('click', () => spawnAircraft('a380'));

        function spawnAircraft(planeKey) {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            
            currentPlaneData = FLEET[planeKey];
            document.getElementById('plane-name-ui').innerText = currentPlaneData.name;
            
            PHYSICS.maxSpeed = currentPlaneData.maxSpeed;
            PHYSICS.stallSpeed = currentPlaneData.stallSpeed;
            PHYSICS.clearance = currentPlaneData.clearance;

            if (currentPlaneData.type === 'fbx') {
                const loader = new FBXLoader();
                loader.load('./' + currentPlaneData.filename, onModelLoaded, onProgress, onError);
            } else if (currentPlaneData.type === 'glb') {
                const loader = new GLTFLoader();
                loader.load('./' + currentPlaneData.filename, (gltf) => onModelLoaded(gltf.scene), onProgress, onError);
            }
        }

        function onModelLoaded(model) {
            airplane = model;
            airplane.scale.setScalar(currentPlaneData.scale);
            
            // Spawn 40,000 units back on the 200,000 unit runway
            airplane.position.set(0, GROUND_LEVEL + PHYSICS.clearance, 40000); 
            airplane.rotation.set(0, Math.PI, 0); 
            
            airplane.traverse((child) => { if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; }});
            scene.add(airplane);
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('ui').style.display = 'block'; 

            spawnProtection = true;
            document.getElementById('status').style.display = 'block';
            setTimeout(() => { spawnProtection = false; document.getElementById('status').style.display = 'none'; }, 3000);
        }

        function onProgress(xhr) { document.getElementById('load-progress').innerText = `${Math.round(xhr.loaded / xhr.total * 100)}%`; }
        function onError(err) { document.getElementById('loading').innerHTML = `ERROR: Could not find ${currentPlaneData.filename}`; console.error(err); }

        // --- GAME LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);

            timeOfDay += delta * 0.02; 
            const sunDist = 150000;
            sunLight.position.set(Math.cos(timeOfDay) * sunDist, Math.sin(timeOfDay) * sunDist, 0);
            
            const sunHeight = Math.sin(timeOfDay);
            if (sunHeight > 0.2) { 
                scene.background = new THREE.Color(0x5ca0e8); scene.fog.color.setHex(0x5ca0e8); 
                sunLight.intensity = 1.2; hemiLight.intensity = 0.6; 
            } else if (sunHeight > 0) { 
                scene.background = new THREE.Color(0xff7b54); scene.fog.color.setHex(0xff7b54); 
                sunLight.intensity = 0.8; 
            } else { 
                scene.background = new THREE.Color(0x050510); scene.fog.color.setHex(0x050510); 
                sunLight.intensity = 0; hemiLight.intensity = 0.2; 
            }
            
            let hours = Math.floor((timeOfDay / (Math.PI * 2)) * 24 + 6) % 24;
            let mins = Math.floor(((timeOfDay / (Math.PI * 2)) * 24 * 60) % 60);
            document.getElementById('time-display').innerText = `${hours.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}`;

            if (airplane && !crashed) {
                if (keys.shift && throttle < 100) throttle += 15 * delta;
                if (keys.control && throttle > 0) throttle -= 20 * delta;
                
                const targetSpeed = (throttle / 100) * PHYSICS.maxSpeed;
                const drag = gearDown ? 0.8 : 1.0; 
                speed += (targetSpeed * drag - speed) * 0.2 * delta;

                const isFlying = speed > PHYSICS.stallSpeed; 
                const turnAgility = isFlying ? 1.2 * delta : 0;
                const pitchAgility = isFlying ? 0.8 * delta : 0;
                
                const currentGroundHeight = getTerrainHeight(airplane.position.x, airplane.position.z);
                const isTouchingGround = airplane.position.y <= (currentGroundHeight + PHYSICS.clearance + 10);
                const groundSteer = (!isFlying && isTouchingGround) ? 0.5 * delta : 0;

                if (keys.w) airplane.rotateX(-pitchAgility);
                if (keys.s) airplane.rotateX(pitchAgility);
                if (keys.a) { airplane.rotateZ(turnAgility); if(isTouchingGround) airplane.rotateY(groundSteer); }
                if (keys.d) { airplane.rotateZ(-turnAgility); if(isTouchingGround) airplane.rotateY(-groundSteer); }
                if (keys.q && isFlying) airplane.rotateY(turnAgility * 0.5);
                if (keys.e && isFlying) airplane.rotateY(-turnAgility * 0.5);

                airplane.rotation.z -= airplane.rotation.z * 1.0 * delta;

                const collisionFloor = currentGroundHeight + PHYSICS.clearance;
                let verticalVelocity = 0;

                if (isFlying) {
                    const lift = (speed - PHYSICS.stallSpeed) * PHYSICS.liftFactor;
                    verticalVelocity = lift - PHYSICS.gravity;
                } else {
                    if (airplane.position.y > collisionFloor + 50) {
                        verticalVelocity = -PHYSICS.gravity * 3; 
                    } else {
                        verticalVelocity = 0; 
                    }
                }
                
                airplane.translateZ(speed * delta);
                airplane.position.y += verticalVelocity * delta;

                if (airplane.position.y <= collisionFloor) {
                    airplane.position.y = collisionFloor; 
                    
                    const pitchRad = airplane.rotation.x;
                    const rollRad = Math.abs(airplane.rotation.z);
                    
                    if (!spawnProtection) {
                        if (verticalVelocity < (-20 * MULT) || pitchRad < -0.15 || rollRad > 0.3 || (!gearDown && (speed/MULT) > 50)) {
                            crashed = true;
                            document.getElementById('crash-screen').style.display = "flex";
                            if (!gearDown) document.getElementById('crash-reason').innerText = "BELLY LANDING. GEAR WAS UP!";
                            else if (pitchRad < -0.15) document.getElementById('crash-reason').innerText = "NOSE DIVE. PITCHED TOO FAR DOWN.";
                            else document.getElementById('crash-reason').innerText = "TERRAIN COLLISION / HARD LANDING.";
                        }
                    } else {
                        verticalVelocity = 0; 
                        airplane.rotation.x = 0; 
                        airplane.rotation.z = 0;
                        airplane.position.y = collisionFloor; // Force lock to floor
                    }
                    if (!crashed) airplane.rotation.x -= airplane.rotation.x * 5 * delta;
                }

                if (airplane.position.x < -10000 && airplane.position.x > -80000 && 
                    airplane.position.z > -30000 && airplane.position.z < 30000 && 
                    airplane.position.y < (GROUND_LEVEL + 15000)) {
                    if (!spawnProtection) { 
                        crashed = true; 
                        document.getElementById('crash-screen').style.display = "flex"; 
                        document.getElementById('crash-reason').innerText = "COLLISION WITH CITY SKYSCRAPER!";
                    }
                }

                // --- CAMERA POSITIONING & UNDERGROUND PREVENTION ---
                const camOffset = new THREE.Vector3(0, currentPlaneData.camHeight, currentPlaneData.camDist);
                camOffset.applyQuaternion(airplane.quaternion);
                const targetCamPos = airplane.position.clone().add(camOffset);
                
                // CRITICAL FIX: Prevent the camera from ever clipping under the ground.
                const camGroundHeight = getTerrainHeight(targetCamPos.x, targetCamPos.z);
                if (targetCamPos.y < camGroundHeight + 100) {
                    targetCamPos.y = camGroundHeight + 100;
                }

                camera.position.lerp(targetCamPos, 0.1);
                camera.lookAt(airplane.position.x, airplane.position.y + currentPlaneData.camLookUp, airplane.position.z);

                document.getElementById('speed').innerText = Math.round(speed / MULT);
                const displayAlt = Math.max(0, Math.round(((airplane.position.y - collisionFloor) / MULT) * 3.28));
                document.getElementById('alt').innerText = displayAlt; 
                document.getElementById('throttle').innerText = Math.round(throttle);
                document.getElementById('gear').innerText = gearDown ? "DOWN" : "UP";
                document.getElementById('gear').style.color = gearDown ? "#00ff9d" : "#ffaa00";
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        animate();
    </script>
</body>
</html>
